<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Пори року</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background-color: #ffe8d6;
        }

        img {
            width: 300px;
            height: 200px;
        }

        button {
            padding: 8px 12px;
            margin: 5px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1 id="title">Літо ☀️</h1>
    <p id="text">Літо — це найтепліша пора року з найдовшими днями та яскравим сонцем. Час відпочинку, пригод та розквіту природи.</p>
    <img id="image" src="https://picsum.photos/id/1057/300/200" alt="Пора року">

    <div>
        <button onclick="showSpring()">🌷 Весна</button>
        <button onclick="showSummer()">☀️ Літо</button>
        <button onclick="showAutumn()">🍁 Осінь</button>
        <button onclick="showWinter()">❄️ Зима</button>
    </div>

    <script>
        function showSpring() {
            let titleElement = document.getElementById("title");
            let textElement = document.getElementById("text");
            let imageElement = document.getElementById("image");

            titleElement.innerText = "Весна 🌷";
            textElement.innerText = "Весна — це час оновлення та пробудження природи. На деревах з'являються бруньки, а навколо розквітають перші квіти.";
            imageElement.src = "https://picsum.photos/id/152/300/200";
            document.body.style.backgroundColor = "#ffe3ed";
        }

        function showSummer() {
            let titleElement = document.getElementById("title");
            let textElement = document.getElementById("text");
            let imageElement = document.getElementById("image");

            titleElement.innerText = "Літо ☀️";
            textElement.innerText = "Літо — це найтепліша пора року з найдовшими днями та яскравим сонцем. Час відпочинку, пригод та розквіту природи.";
            imageElement.src = "https://picsum.photos/id/1057/300/200";
            document.body.style.backgroundColor = "#ffe8d6";
        }

        function showAutumn() {
            let titleElement = document.getElementById("title");
            let textElement = document.getElementById("text");
            let imageElement = document.getElementById("image");

            titleElement.innerText = "Осінь 🍁";
            textElement.innerText = "Осінь приносить із собою золотаві барви та прохолодні дні. Дерева скидають пожовкле листя, створюючи неймовірні пейзажі.";
            // Нова надійна картинка для осені
            imageElement.src = "https://picsum.photos/id/106/300/200";
            document.body.style.backgroundColor = "#f0e6d2";
        }

        function showWinter() {
            let titleElement = document.getElementById("title");
            let textElement = document.getElementById("text");
            let imageElement = document.getElementById("image");

            titleElement.innerText = "Зима ❄️";
            textElement.innerText = "Зима чарує пухнастим снігом, морозними візерунками на вікнах та затишними вечорами. Природа відпочиває під білою ковдрою.";
            imageElement.src = "https://picsum.photos/id/1036/300/200";
            document.body.style.backgroundColor = "#ebd9fc";
        }
    </script>

</body>
</html>
