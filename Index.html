<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Пори року</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 30px;
            /* Початковий колір для Літа */
            background-color: #ffe8d6;
        }

        .card {
            background-color: white;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            border-radius: 15px;
        }

        img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            margin: 15px 0;
        }

        button {
            padding: 10px;
            margin: 3px;
            font-size: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="title">Літо ☀️</h1>
        <p id="text">Літо — це найтепліша пора року з найдовшими днями та яскравим сонцем. Час відпочинку, пригод та розквіту природи.</p>
        <img id="image" src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600" alt="Пора року">

        <div>
            
            <button onclick="changeSeason('Весна 🌷', 'Весна — це час оновлення та пробудження природи. На деревах з\'являються бруньки, а навколо розквітають перші квіти.', 'https://images.unsplash.com/photo-1490750967868-88aa4486c946?w=600', '#ffe3ed')">🌷 Весна</button>
            
            <button onclick="changeSeason('Літо ☀️', 'Літо — це найтепліша пора року з найдовшими днями та яскравим сонцем. Час відпочинку, пригод та розквіту природи.', 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600', '#ffe8d6')">☀️ Літо</button>
            
            <button onclick="changeSeason('Осінь 🍁', 'Осінь приносить із собою золотаві барви та прохолодні дні. Дерева скидають пожовкле листя, створюючи неймовірні пейзажі.', 'https://images.unsplash.com/photo-1507181179465-450597373464?w=600', '#f0e6d2')">🍁 Осінь</button>
            
            <button onclick="changeSeason('Зима ❄️', 'Зима чарує пухнастим снігом, морозними візерунками на вікнах та затишними вечорами. Природа відпочиває під білою ковдрою.', 'https://images.unsplash.com/photo-1483921020237-2ff51e8e4b22?w=600', '#ebd9fc')">❄️ Зима</button>
        </div>
    </div>

    <script>
    
        function changeSeason(titleText, infoText, imageSrc, bgColor) {
            document.getElementById("title").innerText = titleText;
            document.getElementById("text").innerText = infoText;
            document.getElementById("image").src = imageSrc;
            document.body.style.backgroundColor = bgColor;
        }
    </script>

</body>
</html>
